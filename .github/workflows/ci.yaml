# .github/workflows/ci.yaml
#
# CI/CD PIPELINE — HOW IT FITS INTO THE PLATFORM
# ────────────────────────────────────────────────
# This file is the bridge between a developer pushing code and ArgoCD
# deploying it to the cluster. It does the work that a human used to
# do manually: build the image, check it for vulnerabilities, push it
# to ECR, then tell ArgoCD "there is something new to deploy" by
# updating the image tag in Git.
#
# ArgoCD never pulls from CI directly. CI writes to Git. ArgoCD reads
# from Git. That boundary keeps GitOps clean — Git is always the truth.
#
# PIPELINE STAGES:
#
#   PR opened/updated:
#     [build] → [trivy scan]
#     Nothing is pushed. You get fast feedback on whether the image
#     is safe before code is merged.
#
#   Merged to main:
#     [build] → [trivy scan] → [push to ECR] → [update dev values in Git]
#     ArgoCD detects the values change and auto-deploys to dev.
#
#   Manual prod promotion:
#     [promote-to-prod job]
#     A human runs this after verifying dev looks healthy. It updates
#     values-prod.yaml with the same pinned tag and commits to Git.
#     ArgoCD detects the change but waits — prod sync is manual in ArgoCD.
#
# SECRETS REQUIRED (set in GitHub → Settings → Secrets):
#   AWS_ROLE_ARN          ARN of an IAM role GitHub Actions will assume
#   AWS_REGION            eu-west-1
#   ECR_REGISTRY          444062204470.dkr.ecr.eu-west-1.amazonaws.com

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'helm/**'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'helm/**'
  # Allows manually triggering the prod promotion job from the GitHub UI
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to promote to prod (e.g. main-a1b2c3d)'
        required: true
      service:
        description: 'Service to promote (api-gateway / user-service / order-service / all)'
        required: true
        default: 'all'

# Permissions needed for OIDC auth with AWS (no long-lived keys stored in GitHub)
permissions:
  id-token: write   # required for AWS OIDC
  contents: write   # required to commit updated Helm values back to Git
  pull-requests: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:

  # ── JOB 1: BUILD + SCAN ────────────────────────────────────────────────────
  # Runs on every PR and every push to main.
  # Builds the Docker image and scans it with Trivy.
  # Fails the pipeline if any CRITICAL CVE is found — the image is not pushed.
  #
  # Matrix strategy: runs this job 3 times in parallel, once per service.
  # This is cleaner than copy-pasting the same job 3 times.
  build-and-scan:
    name: Build & Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # if one service fails, keep scanning the others
      matrix:
        service:
          - api-gateway
          - user-service
          - order-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC authentication — GitHub proves its identity to AWS using a
      # short-lived token. No AWS access keys stored in GitHub secrets.
      # Requires an IAM role configured to trust GitHub's OIDC provider.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Generate a deterministic image tag from the Git commit SHA.
      # Using the SHA means every image is traceable back to an exact
      # commit. This is what gets pinned in values-prod.yaml.
      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=main-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image=${{ env.ECR_REGISTRY }}/platform-dev-${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }} \
            -t ${{ steps.tag.outputs.image }}:dev-latest \
            apps/${{ matrix.service }}/

      # Trivy scans the built image for known CVEs.
      # EXIT_CODE 1 means: fail the pipeline if CRITICAL vulnerabilities found.
      # This is the gate that enforces "only scanned images reach ECR".
      # Kyverno's require-trusted-registry policy then ensures only ECR
      # images run in the cluster — together they form the supply chain.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true   # don't fail on CVEs with no available fix yet

      # Upload the full Trivy report as an artifact so you can review it
      # in the GitHub Actions UI even after the job passes.
      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()   # upload even if the scan fails
        with:
          name: trivy-results-${{ matrix.service }}
          path: trivy-results.sarif
          retention-days: 30

      # Only push images on merges to main — not on PRs.
      # On a PR you want to know the image is safe; you don't want to
      # clutter ECR with images from every branch and draft PR.
      - name: Push image to ECR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
          docker push ${{ steps.tag.outputs.image }}:dev-latest

      # Pass the tag to the next job via output.
      # Jobs can't share environment variables directly — outputs are the
      # mechanism for passing data between jobs.
      - name: Export tag for downstream jobs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo "${{ matrix.service }}=${{ steps.tag.outputs.tag }}" >> $GITHUB_OUTPUT
        id: export

  # ── JOB 2: UPDATE DEV HELM VALUES ─────────────────────────────────────────
  # Runs only on merges to main, after all build-and-scan jobs pass.
  # Updates the image tag in each service's values-dev.yaml and commits
  # the change back to Git.
  #
  # This single Git commit is what ArgoCD watches for.
  # ArgoCD sees the new tag, renders the Helm chart, and deploys to dev.
  # No webhook, no direct API call — just a Git commit.
  update-dev-values:
    name: Update dev Helm values
    runs-on: ubuntu-latest
    needs: build-and-scan   # only runs if ALL build-and-scan jobs passed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=main-${SHORT_SHA}" >> $GITHUB_OUTPUT

      # Update the image tag in all three values-dev.yaml files.
      # sed finds the line containing `tag:` and replaces its value.
      # This is safe because each values file is scoped to one service.
      - name: Update image tags in dev values files
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          for service in api-gateway user-service order-service; do
            sed -i "s/tag: .*/tag: \"${TAG}\"/" helm/${service}/values-dev.yaml
          done

      # Set a bot identity for the commit so it's clear this wasn't
      # a human commit. The [skip ci] suffix prevents this commit from
      # triggering the pipeline again in an infinite loop.
      - name: Commit updated values back to Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/*/values-dev.yaml
          git commit -m "chore: update dev image tags to ${{ steps.tag.outputs.tag }} [skip ci]"
          git push

  # ── JOB 3: PROMOTE TO PROD ────────────────────────────────────────────────
  # Manual only — triggered via workflow_dispatch from the GitHub UI.
  # A human runs this after verifying dev is healthy.
  #
  # It takes an image tag as input (e.g. main-a1b2c3d), updates
  # values-prod.yaml, and commits to Git. ArgoCD detects the change
###  # but waits for a human to approve the sync in the ArgoCD UI —
  # that's the second gate before anything hits production.
  promote-to-prod:
    name: Promote to prod
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    # GitHub Environments let you add required reviewers, wait timers,
    # and deployment protection rules before this job runs.
    # Create a "production" environment in GitHub → Settings → Environments.
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine which services to promote
        id: services
        run: |
          if [ "${{ github.event.inputs.service }}" = "all" ]; then
            echo "list=api-gateway user-service order-service" >> $GITHUB_OUTPUT
          else
            echo "list=${{ github.event.inputs.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Update image tags in prod values files
        run: |
          TAG=${{ github.event.inputs.image_tag }}
          for service in ${{ steps.services.outputs.list }}; do
            sed -i "s/tag: .*/tag: \"${TAG}\"/" helm/${service}/values-prod.yaml
            echo "Updated ${service} to ${TAG}"
          done

      - name: Commit prod values to Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/*/values-prod.yaml
          git commit -m "chore: promote ${{ github.event.inputs.service }} to prod @ ${{ github.event.inputs.image_tag }} [skip ci]"
          git push

      # Reminder — ArgoCD prod sync is still manual.
      # This job only updates Git. A human must still click Sync in ArgoCD.
      - name: Remind — ArgoCD prod sync is manual
        run: |
          echo "✅ values-prod.yaml updated in Git."
          echo "👉 Now go to ArgoCD and sync the prod application(s) manually."
          echo "   argocd app sync api-gateway-prod"
          echo "   argocd app sync user-service-prod"
          echo "   argocd app sync order-service-prod"
