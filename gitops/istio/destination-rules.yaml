---
# ── PROD DestinationRules ─────────────────────────────────────────────────────
# Stricter thresholds — less tolerance for errors before ejecting a pod.

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: api-gateway
  namespace: prod
spec:
  host: api-gateway
  trafficPolicy:
    loadBalancer:
      simple: LEAST_CONN
    connectionPool:
      http:
        http1MaxPendingRequests: 200
        http2MaxRequests: 2000
    outlierDetection:
      consecutiveGatewayErrors: 3       # stricter in prod — eject faster
      interval: 10s
      baseEjectionTime: 60s             # longer cooldown in prod
      maxEjectionPercent: 33            # never eject more than 1 of 3 prod pods

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: user-service
  namespace: prod
spec:
  host: user-service
