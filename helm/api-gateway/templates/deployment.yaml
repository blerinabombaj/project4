# templates/deployment.yaml
# A Deployment tells Kubernetes: "keep N replicas of this pod running at all times,
# and roll out updates without downtime."
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}                  # set by `helm install <name>`
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}               # must match template.metadata.labels
  strategy:
    type: RollingUpdate                      # replace pods one at a time — zero downtime
    rollingUpdate:
      maxUnavailable: 1                      # at most 1 pod down during update
      maxSurge: 1                            # at most 1 extra pod spun up during update
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        # This label is used by Istio to identify the version for traffic splitting
        version: {{ .Values.image.tag | quote }}
    spec:
      # Spread pods across nodes — if one node dies, not all replicas go with it
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ .Release.Name }}
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          # Inject all env vars from values
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          # Readiness probe: pod won't receive traffic until /health returns 200
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          # Liveness probe: pod is restarted if /health stops returning 200
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          # Enforce the same security posture defined in the Dockerfile
          securityContext:
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
