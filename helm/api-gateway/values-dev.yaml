# values-dev.yaml — dev environment overrides
# Only specify what  ## differs from values.yaml

replicaCount: 1       # single replica is fine for dev

image:
  repository: "444062204470.dkr.ecr.eu-west-1.amazonaws.com/platform-dev-api-gateway"
  tag: "main-broken"
  pullPolicy: Always  # always pull in dev so you get the freshest image

resources:
  requests:
    cpu: "50m"        # relaxed in dev — cheaper, nodes are smaller
    memory: "64Mi"
  limits:
    cpu: "150m"
    memory: "128Mi"
