# values-prod.yaml — prod environment overrides#

replicaCount: 3       # 3 replicas for high availability across AZs

image:
  repository: "444062204470.dkr.ecr.eu-west-1.amazonaws.com/platform-dev-api-gateway"
  tag: "1.0.0"        # pinned tag in prod — never use 'latest' in production
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
